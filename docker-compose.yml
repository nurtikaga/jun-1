services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - app

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/ecommerce?sslmode=disable"
      MIGRATIONS_PATH: "migrations"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
    driver: bridge